name: dadjokes

services: 
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    container_name: dadjokes-db
    ports: 
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgrsql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment: 
      POSTGRES_USER: dadjokes
      POSTGRES_PASSWORD: dadjokes
      POSTGRES_DB: dadjokes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadjokes"]
      interval: 5s
      timeout: 5s
      retries: 5



  # ---------- Express API ----------
  api:
    build:
      context: ./api
    container_name: dadjokes-api
    ports: 
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dadjokes
      DB_PASSWORD: dadjokes
      DB_NAME: dadjokes
    depends_on:
      db: 
        condition: service_healthy
    restart: unless-stopped



  # ---------- React Frontend (served by nginx) ----------

  frontend:
    build:
      context: ./frontend
    container_name: dadjokes-frontend
    ports: 
      - "8080:80"
    depends_on: 
      - api
    restart: unless-stopped


volumes:
  pgdata:
