name: dadjokes

services: 
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    container_name: dadjokes-db
    ports: 
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment: 
      POSTGRES_USER: dadjokes
      # POSTGRES_PASSWORD: dadjokes
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: dadjokes
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadjokes"]
      interval: 5s
      timeout: 5s
      retries: 5



  # ---------- Express API ----------
  api:
    build:
      context: ./api
      target: dev
    container_name: dadjokes-api
    ports: 
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dadjokes
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      # DB_PASSWORD: dadjokes
      DB_NAME: dadjokes
      REDIS_URL: redis://redis:6379
    secrets:
      - postgres_password
    depends_on:
      db: 
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

    # watch stuff
    #command: ["node", "--watch", "/app/src/index.ts"]
    develop:
      watch:
        - path: ./api/src 
          target: /app/src
          action: sync 
        - path: ./api/package*.json
          target: /app/package*.json
          action: rebuild

  # ---------- redis cache ----------
  redis:
    image: redis:7-alpine
    container_name: dadjokes-redis
    restart: unless-stopped
    ports:
      - "6379:6379" #local inspection
    volumes:
      - redis_data:/data 
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ---------- pgAdmin Database Manager ----------
  pgadmin:
    image: dpage/pgadmin4
    container_name: dadjokes-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db


  # ---------- React Frontend (served by nginx) ----------

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: dadjokes-frontend
    ports: 
      #- "8080:80"
      - 8080:5173
    depends_on: 
      - api
    restart: unless-stopped

    # watch stuff
    #command: ["vite"]
    develop:
      watch:
        - path: ./frontend/src 
          target: /app/src
          action: sync 
        - path: ./frontend/index.html 
          target: /app/index.html
          action: sync 
        - path: ./frontend/nginx.conf
          target: /etc/nginx/conf.d/default.conf
          action: sync+restart
        - path: ./frontend/package*.json
          target: /app/package*.json
          action: rebuild

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt


volumes:
  pgdata:
  redis_data:
  pgadmin_data: